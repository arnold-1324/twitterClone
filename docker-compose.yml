version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "6379:6379"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=your_mongodb_uri
      - JWT_SECRET=your_jwt_secret
      - REDIS_URL=redis://localhost:6379
    volumes:
      - redis-data:/data
    depends_on:
      - redis

  redis:
    image: redis:alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

volumes:
  redis-data:
